<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=projeto-corpo-novo-produto-completo.html">
  <link rel="canonical" href="projeto-corpo-novo-produto-completo.html">
  <title>Projeto Corpo Novo | Produto Digital</title>
  <style>
    :root {
      --green: #1fbf75;
      --green-dark: #0a6b45;
      --cream: #fffaf3;
      --ink: #17231d;
      --muted: #657269;
      --line: rgba(23, 35, 29, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 24px;
      background: linear-gradient(135deg, rgba(31, 191, 117, 0.16), rgba(255, 90, 95, 0.08)), var(--cream);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      line-height: 1.55;
    }

    main {
      width: min(620px, 100%);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 70px rgba(25, 55, 42, 0.14);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 8vw, 3rem);
      line-height: 1.02;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
    }

    .actions {
      display: grid;
      gap: 12px;
    }

    a {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: 900;
      text-decoration: none;
    }

    .primary {
      background: linear-gradient(135deg, var(--green), #0fa3b1);
      color: #ffffff;
    }

    .secondary {
      border: 1px solid var(--line);
      color: var(--green-dark);
      background: rgba(31, 191, 117, 0.08);
    }
  </style>
  <script>
    window.location.replace("projeto-corpo-novo-produto-completo.html" + window.location.search + window.location.hash);
  </script>
</head>
<body>
  <main>
    <h1>Projeto Corpo Novo</h1>
    <p>Redirecionando para o produto digital completo...</p>
    <div class="actions">
      <a class="primary" href="projeto-corpo-novo-produto-completo.html">Abrir produto digital</a>
      <a class="secondary" href="Projeto-Corpo-Novo-Produto-Digital-Completo.pdf">Abrir PDF</a>
    </div>
  </main>
</body>
</html>
