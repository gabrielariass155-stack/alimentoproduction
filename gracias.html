<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Confirmação de compra do Projeto Corpo Novo.">
  <title>Obrigado pela compra | Projeto Corpo Novo</title>
  <style>
    :root {
      --cream: #fffaf3;
      --green: #1fbf75;
      --green-dark: #0a6b45;
      --teal: #0fa3b1;
      --coral: #ff5a5f;
      --yellow: #f9c74f;
      --ink: #17231d;
      --muted: #657269;
      --white: #ffffff;
      --line: rgba(23, 35, 29, 0.12);
      --shadow: 0 24px 70px rgba(25, 55, 42, 0.18);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
      padding: 32px 18px;
      background:
        linear-gradient(90deg, rgba(15, 35, 25, 0.86), rgba(15, 35, 25, 0.58)),
        url("assets/images/projeto-corpo-novo-mealprep.png") center/cover;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      line-height: 1.55;
      overflow-x: hidden;
    }

    .card {
      width: min(640px, calc(100vw - 36px));
      padding: clamp(28px, 6vw, 46px);
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(14px);
    }

    .icon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      margin: 0 auto 22px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--green), var(--teal));
      color: var(--white);
    }

    .icon svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--green-dark);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 16px;
      color: var(--ink);
      font-size: clamp(2.1rem, 7vw, 3.2rem);
      line-height: 1.03;
      letter-spacing: 0;
      overflow-wrap: break-word;
    }

    p {
      margin: 0;
      color: var(--muted);
      overflow-wrap: break-word;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    .button,
    .link {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      font-weight: 950;
      text-decoration: none;
    }

    .button {
      background: linear-gradient(135deg, var(--coral), #ff7a3d 54%, var(--yellow));
      color: #23130e;
      box-shadow: 0 16px 36px rgba(255, 90, 95, 0.22);
    }

    .link {
      border: 1px solid var(--line);
      color: var(--green-dark);
      background: rgba(31, 191, 117, 0.08);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"></path></svg>
    </div>
    <p class="eyebrow">Compra confirmada</p>
    <h1>Obrigado pela sua compra.</h1>
    <p>Seu acesso ao Projeto Corpo Novo deve aparecer na Kiwify e no e-mail usado na compra. Mantemos o conteúdo fora desta página pública para proteger o produto digital.</p>
    <div class="actions">
      <a class="button" href="https://pay.kiwify.com.br/RQPyQaS">Ver acesso na Kiwify</a>
      <a class="link" href="index.html">Voltar para a página principal</a>
    </div>
  </main>
</body>
</html>
